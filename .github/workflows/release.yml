name: Release

env:
  MISE_EXPERIMENTAL: "1"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-core:
    name: Build core (${{ matrix.target.name }})
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: linux_x86_64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true

      - name: Build core binaries
        working-directory: core
        env:
          BASTION_VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: mise run build

      - name: Package core binaries
        working-directory: core
        run: |
          set -euo pipefail

          archive="bastion_${GITHUB_REF_NAME}_${{ matrix.target.name }}.tar.gz"
          mkdir -p ../dist
          tar -C tmp -czf "../dist/${archive}" bastion bastiond
          (cd ../dist && sha256sum "${archive}" > "${archive}.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.target.name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-core]
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*

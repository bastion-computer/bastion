name: Release

env:
  MISE_EXPERIMENTAL: "1"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-core:
    name: Build core (${{ matrix.target.name }})
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: linux_x86_64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            binaries: bastion bastion-guest-proxy
          - name: darwin_arm64
            runner: macos-14
            goos: darwin
            goarch: arm64
            binaries: bastion

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true

      - name: Build core binaries
        working-directory: core
        env:
          BASTION_VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: mise run build

      - name: Package core binaries
        working-directory: core
        run: |
          set -euo pipefail

          archive="bastion_${GITHUB_REF_NAME}_${{ matrix.target.name }}.tar.gz"
          binaries="${{ matrix.target.binaries }}"
          mkdir -p ../dist
          tar -C tmp -czf "../dist/${archive}" ${binaries}
          if command -v sha256sum >/dev/null 2>&1; then
            (cd ../dist && sha256sum "${archive}" > "${archive}.sha256")
          else
            (cd ../dist && shasum -a 256 "${archive}" > "${archive}.sha256")
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.target.name }}
          path: dist/*
          if-no-files-found: error

  publish-docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: [build-core]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release channel
        id: release_channel
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF_NAME" == *-rc.* ]]; then
            printf 'prerelease=true\n' >> "$GITHUB_OUTPUT"
            printf 'make_latest=false\n' >> "$GITHUB_OUTPUT"
          else
            printf 'prerelease=false\n' >> "$GITHUB_OUTPUT"
            printf 'make_latest=true\n' >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: docker_metadata
        with:
          images: bastioncomputer/bastion
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest,enable=${{ steps.release_channel.outputs.make_latest == 'true' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker_metadata.outputs.tags }}
          labels: ${{ steps.docker_metadata.outputs.labels }}
          build-args: |
            BASTION_VERSION=${{ github.ref_name }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-core, publish-docker]
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: core-*
          path: dist
          merge-multiple: true

      - name: Resolve release channel
        id: release_channel
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF_NAME" == *-rc.* ]]; then
            printf 'prerelease=true\n' >> "$GITHUB_OUTPUT"
            printf 'make_latest=false\n' >> "$GITHUB_OUTPUT"
          else
            printf 'prerelease=false\n' >> "$GITHUB_OUTPUT"
            printf 'make_latest=true\n' >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ steps.release_channel.outputs.prerelease }}
          make_latest: ${{ steps.release_channel.outputs.make_latest }}
          files: dist/*

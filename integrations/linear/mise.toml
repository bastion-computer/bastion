[tasks.lint]
description = "Run Go linters"
run = "golangci-lint run ./..."

[tasks."format:check"]
description = "Check Go formatting"
run = '''
#!/usr/bin/env bash
set -euo pipefail

files="$(gofmt -l .)"
if [ -n "$files" ]; then
  printf '%s\n' "$files"
  exit 1
fi
'''

[tasks."format:write"]
description = "Format Go files"
run = "gofmt -w ."

[tasks.build]
description = "Build the Linear integration service"
run = '''
#!/usr/bin/env bash
set -euo pipefail

mkdir -p tmp
ldflags=""
if [ -n "${BASTION_VERSION:-}" ]; then
  ldflags="-X github.com/bastion-computer/bastion/integrations/linear/internal/config.Version=${BASTION_VERSION}"
fi

go build -ldflags "$ldflags" -o ./tmp/bastion-linear ./cmd/bastion-linear
'''

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

experimental_monorepo_root = true

[settings]
experimental = true

[hooks]
postinstall = { task = "install:js" }

[env]
CC = "zig cc"
CGO_ENABLED = "1"

[tools]
bun = "1.3.13"
go = "1.26.2"
node = "24.15.0"
air = "latest"
golangci-lint = "2.12.2"
tmux = "3.6a"
zig = "0.15.2"

[monorepo]
config_roots = [
  "core",
  ".dev/drizzle",
  "docs",
]

[tasks.lint]
description = "Run lint tasks across all active packages"
run = '''
#!/usr/bin/env bash
set -euo pipefail

(cd core && golangci-lint run ./...)
(cd docs && bun run lint)
'''

[tasks."format:check"]
description = "Check formatting across all active packages"
run = [{ tasks = ["//core:format:check", "//.dev/drizzle:format:check", "//docs:format:check"] }]

[tasks."format:write"]
description = "Format all active packages"
run = [{ tasks = ["//core:format:write", "//.dev/drizzle:format:write", "//docs:format:write"] }]

[tasks.build]
description = "Run build tasks across all active packages"
run = [{ tasks = ["//core:build", "//docs:build"] }]

[tasks.typecheck]
description = "Run typecheck tasks across all active packages"
run = [{ tasks = ["//docs:typecheck"] }]

[tasks.test]
description = "Run tests across all active packages"
run = [{ tasks = ["check:release-workflow", "check:install-script", "//core:test"] }]

[tasks."check:release-workflow"]
description = "Check release workflow package contents"
run = "bash ./scripts/check-release-workflow.sh"

[tasks."check:install-script"]
description = "Check public install script release selection"
run = "bash ./scripts/check-install-script.sh"

[tasks."install:js"]
description = "Install JavaScript dependencies"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ "${CI:-}" = "true" ]; then
  bun install --frozen-lockfile
else
  bun install
fi
'''

[tasks."dev:up"]
description = "Start active development services"
run = "bash ./dev.sh up"

[tasks."dev:down"]
description = "Stop active development services"
run = "bash ./dev.sh down"

[tasks."dev:reset"]
description = "Remove the local dev data directory"
run = '''
#!/usr/bin/env bash
set -euo pipefail

root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
data_dir="$root/.bastion"

if [ "$data_dir" = "/" ] || [ "$data_dir" = "" ]; then
  printf 'Refusing to remove unsafe data dir: %s\n' "$data_dir" >&2
  exit 1
fi

sudo rm -rf -- "$data_dir"
printf 'Removed dev data dir: %s\n' "$data_dir"
'''

[tasks."dev:bastion"]
description = "Run the Bastion CLI against the local dev API"
run = "go run ./core/cmd/bastion --api-url \"${BASTION_API_URL:-http://localhost:3148}\""

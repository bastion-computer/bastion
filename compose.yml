services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: bastion_cluster
      POSTGRES_USER: bastion
      POSTGRES_PASSWORD: bastion
    ports:
      - "${BASTION_DEV_BIND_HOST:-127.0.0.1}:${BASTION_DEV_POSTGRES_PORT:-3152}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: bastion
      MINIO_ROOT_PASSWORD: bastion-secret
    ports:
      - "${BASTION_DEV_BIND_HOST:-127.0.0.1}:${BASTION_DEV_MINIO_PORT:-3153}:9000"
      - "${BASTION_DEV_BIND_HOST:-127.0.0.1}:${BASTION_DEV_MINIO_CONSOLE_PORT:-3154}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "until mc alias set local http://minio:9000 bastion bastion-secret; do sleep 1; done;
      mc mb --ignore-existing local/bastion-templates"

volumes:
  postgres-data:
  minio-data:

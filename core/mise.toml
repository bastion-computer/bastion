[tasks.lint]
description = "Run Go linters"
run = "golangci-lint run ./..."

[tasks."format:check"]
description = "Check Go formatting"
run = '''
#!/usr/bin/env bash
set -euo pipefail

files="$(gofmt -l .)"
if [ -n "$files" ]; then
  printf '%s\n' "$files"
  exit 1
fi
'''

[tasks."format:write"]
description = "Format Go files"
run = "gofmt -w ."

[tasks.build]
description = "Build the Bastion CLI and daemon"
run = '''
#!/usr/bin/env bash
set -euo pipefail

mkdir -p tmp
ldflags=""
if [ -n "${BASTION_VERSION:-}" ]; then
  ldflags="-X github.com/bastion-computer/bastion/core/internal/config.Version=${BASTION_VERSION}"
fi

go build -ldflags "$ldflags" -o ./tmp/bastion ./cmd/bastion
go build -ldflags "$ldflags" -o ./tmp/bastiond ./cmd/bastiond
'''

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

[tasks."test:e2e"]
description = "Run environment E2E tests against the local dev API"
run = '''
#!/usr/bin/env bash
set -euo pipefail

mkdir -p tmp
ldflags=""
if [ -n "${BASTION_VERSION:-}" ]; then
  ldflags="-X github.com/bastion-computer/bastion/core/internal/config.Version=${BASTION_VERSION}"
fi

go build -ldflags "$ldflags" -o ./tmp/bastion ./cmd/bastion
go build -ldflags "$ldflags" -o ./tmp/bastiond ./cmd/bastiond
bash ./e2e/env-test.sh
bash ./e2e/ssh-test.sh
bash ./e2e/mux-test.sh
bash ./e2e/install-test.sh
bash ./e2e/nested-test.sh
'''

[tasks."dev:api"]
description = "Run the host API with Air live reload"
run = "air -c .air.api.toml"

[tasks."dev:daemon"]
description = "Run bastiond with Air live reload"
run = "air -c .air.daemon.toml"

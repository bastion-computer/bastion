# Bastion mux tmux configuration. This file is embedded in the CLI and applied
# to the Bastion mux session when `bastion mux` starts.

set-option -F -q -t bastion default-command "#{@bastion_mux_pending_command}"
set-option -q -t bastion detach-on-destroy on
set-option -q -t bastion escape-time 10
set-option -q -t bastion mouse on

# Capture status tab clicks in tmux even if a pane app enables mouse reporting.
bind-key -T root MouseDown1Status select-window -t =
bind-key -T root WheelUpStatus previous-window
bind-key -T root WheelDownStatus next-window

# Nord palette colors are embedded here to keep Bastion mux styling isolated to
# the `bastion` tmux session instead of depending on global tmux configuration.
set-option -q -t bastion status on
set-option -q -t bastion status-interval 1
set-option -q -t bastion status-justify left
set-option -q -t bastion status-style "bg=#2E3440,fg=#ECEFF4"
set-option -q -t bastion status-left "#[fg=#2E3440,bg=#5E81AC,bold] bastion #[fg=#ECEFF4,bg=#3B4252,nobold]"
set-option -q -t bastion status-left-length 24
set-option -q -t bastion status-right "#[fg=#D8DEE9,bg=#3B4252] %Y-%m-%d | %H:%M #[fg=#2E3440,bg=#88C0D0,bold] #H "
set-option -q -t bastion status-right-length 48
set-option -q -t bastion message-style "bg=#3B4252,fg=#88C0D0"
set-option -q -t bastion message-command-style "bg=#3B4252,fg=#88C0D0"
set-option -q -t bastion display-panes-colour "#4C566A"
set-option -q -t bastion display-panes-active-colour "#88C0D0"

# Window options are local in tmux, so apply them to the current window and to
# tabs created later inside the Bastion session.
set-hook -t bastion after-new-window[90] "set-window-option -q allow-rename off ; set-window-option -q automatic-rename off ; set-window-option -q remain-on-exit failed ; set-window-option -q menu-style 'bg=#2E3440,fg=#D8DEE9' ; set-window-option -q menu-selected-style 'bg=#88C0D0,fg=#2E3440,bold' ; set-window-option -q menu-border-style 'fg=#88C0D0,bg=#2E3440,bold' ; set-window-option -q popup-style 'bg=#2E3440,fg=#D8DEE9' ; set-window-option -q popup-border-style 'fg=#88C0D0,bg=#2E3440,bold' ; set-window-option -q clock-mode-colour '#88C0D0' ; set-window-option -q mode-style 'bg=#88C0D0,fg=#2E3440,bold' ; set-window-option -q pane-border-style 'bg=default,fg=#4C566A' ; set-window-option -q pane-active-border-style 'bg=default,fg=#88C0D0' ; set-window-option -q window-status-format '#[fg=#D8DEE9,bg=#3B4252]  #I #W #F  ' ; set-window-option -q window-status-current-format '#[fg=#2E3440,bg=#88C0D0,bold]  #I #W #F  ' ; set-window-option -q window-status-separator ''"

set-window-option -q -t bastion: allow-rename off
set-window-option -q -t bastion: automatic-rename off
set-window-option -q -t bastion: remain-on-exit failed
set-window-option -q -t bastion: menu-style "bg=#2E3440,fg=#D8DEE9"
set-window-option -q -t bastion: menu-selected-style "bg=#88C0D0,fg=#2E3440,bold"
set-window-option -q -t bastion: menu-border-style "fg=#88C0D0,bg=#2E3440,bold"
set-window-option -q -t bastion: popup-style "bg=#2E3440,fg=#D8DEE9"
set-window-option -q -t bastion: popup-border-style "fg=#88C0D0,bg=#2E3440,bold"
set-window-option -q -t bastion: clock-mode-colour "#88C0D0"
set-window-option -q -t bastion: mode-style "bg=#88C0D0,fg=#2E3440,bold"
set-window-option -q -t bastion: pane-border-style "bg=default,fg=#4C566A"
set-window-option -q -t bastion: pane-active-border-style "bg=default,fg=#88C0D0"
set-window-option -q -t bastion: window-status-format "#[fg=#D8DEE9,bg=#3B4252]  #I #W #F  "
set-window-option -q -t bastion: window-status-current-format "#[fg=#2E3440,bg=#88C0D0,bold]  #I #W #F  "
set-window-option -q -t bastion: window-status-separator ""

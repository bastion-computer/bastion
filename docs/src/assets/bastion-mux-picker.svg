<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Bastion mux environment picker</title>
  <desc id="desc">A terminal screenshot showing the Bastion mux TUI with no SSH sessions and the environment picker open.</desc>
  <rect width="1280" height="760" fill="#0b1020"/>
  <rect x="32" y="32" width="1216" height="696" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
  <circle cx="68" cy="64" r="8" fill="#ef4444"/>
  <circle cx="94" cy="64" r="8" fill="#f59e0b"/>
  <circle cx="120" cy="64" r="8" fill="#22c55e"/>
  <text x="640" y="70" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="18" fill="#94a3b8">bastion mux</text>

  <g font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">
    <text x="64" y="122" font-size="20" fill="#94a3b8">bastion mux: no SSH sessions</text>
    <rect x="64" y="146" width="1152" height="276" rx="8" fill="#0f172a" stroke="#475569" stroke-width="2"/>
    <text x="92" y="190" font-size="20" fill="#e2e8f0">Press n to create a persistent SSH session. Press q to detach.</text>
    <text x="92" y="226" font-size="18" fill="#64748b">No bastion ssh process is started until an environment is selected.</text>

    <rect x="208" y="454" width="864" height="176" rx="10" fill="#111827" stroke="#8b5cf6" stroke-width="3"/>
    <text x="240" y="498" font-size="20" font-weight="700" fill="#f8fafc">Running Bastion environments</text>
    <text x="1016" y="498" font-size="16" fill="#94a3b8" text-anchor="end">1 environment</text>
    <rect x="236" y="526" width="808" height="58" rx="6" fill="#312e81" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="260" y="552" font-size="18" font-weight="700" fill="#ffffff">env_083772b6-0a5e-4db9-a200-c659166b8341</text>
    <text x="260" y="576" font-size="15" fill="#c4b5fd">env_083772b6-0a5e-4db9-a200-c659166b8341 | running</text>
    <text x="240" y="614" font-size="15" fill="#94a3b8">enter connect  esc close  / filter</text>

    <text x="64" y="684" font-size="18" fill="#94a3b8">ctrl+b n new | ctrl+b h/l switch | ctrl+b d detach | loading environments</text>
  </g>
</svg>
